[phases.setup]
nixPkgs = ["python3", "ffmpeg"]

[phases.install]
cmds = [
    "python3 -m venv /opt/venv",
    "/opt/venv/bin/pip install -r requirements.txt"
]

[phases.build]
cmds = ["/opt/venv/bin/python manage.py collectstatic --noinput"]

[start]
cmd = "/opt/venv/bin/gunicorn parktrack.wsgi --workers 2 --timeout 120"